<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rinanze (RIN) — Public Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
  <style>
    /* glass-morphism & custom tweaks */
    body {
      background: radial-gradient(circle at 20% 30%, #0b0f1a, #05070c);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1rem;
    }
    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }
    .input-glass {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.2s;
    }
    .input-glass:focus {
      outline: none;
      border-color: #7c5cfc;
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.2);
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c5cfc, #5b3cdb);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124, 92, 252, 0.3);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      transform: none;
    }
    .trade-btn {
      background: #1e9b4a;
    }
    .trade-btn:hover {
      background: #15803d;
      transform: translateY(-1px);
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .modal-content {
      width: 96%;
      max-width: 480px;
      height: 85vh;
      max-height: 700px;
      background: #0b0f1a;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }
    .modal-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .close-modal {
      position: absolute;
      top: 8px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 28px;
      cursor: pointer;
      padding: 0 8px;
      border-radius: 8px;
      z-index: 10;
    }
    .close-modal:hover {
      background: rgba(0,0,0,0.8);
    }
    /* spinner */
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,0.2);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="glass w-full max-w-lg p-6 sm:p-8 space-y-6 text-white">
  <!-- header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Rinanze <span class="text-sm font-normal text-gray-400">RIN</span></h1>
      <p class="text-xs text-gray-400 mt-0.5">BNB Smart Chain</p>
    </div>
    <button id="connectBtn" class="btn-primary px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Connect
    </button>
  </div>

  <!-- balance -->
  <div class="bg-white/5 rounded-2xl p-5 text-center">
    <div class="text-sm text-gray-400">Your RIN balance</div>
    <div class="text-3xl font-bold mt-1" id="balanceDisplay">0.00</div>
    <div class="text-xs text-gray-500 mt-1">≈ $0.00</div>
  </div>

  <!-- transfer -->
  <div class="space-y-3">
    <input id="recipient" type="text" placeholder="Recipient address (0x...)" class="input-glass w-full rounded-xl px-4 py-3 text-sm" />
    <div class="flex gap-2">
      <input id="amount" type="text" placeholder="Amount (e.g. 100)" class="input-glass w-full rounded-xl px-4 py-3 text-sm" />
      <button id="sendBtn" class="btn-primary shrink-0 px-6 py-3 rounded-xl text-sm font-medium disabled:opacity-50">Send</button>
    </div>
  </div>

  <!-- trade button -->
  <button id="tradeBtn" class="trade-btn w-full py-3 rounded-xl text-sm font-medium flex items-center justify-center gap-2 transition">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
    Trade on PancakeSwap
  </button>

  <!-- admin panel (hidden) -->
  <div id="adminPanel" class="hidden border-t border-white/10 pt-4 mt-4">
    <h3 class="text-sm font-semibold text-amber-400 mb-2">⚡ Admin</h3>
    <div class="flex gap-2">
      <input id="mintRecipient" type="text" placeholder="Mint to address" class="input-glass w-full rounded-xl px-4 py-3 text-sm" />
      <input id="mintAmount" type="text" placeholder="Amount" class="input-glass w-1/3 rounded-xl px-4 py-3 text-sm" />
      <button id="mintBtn" class="bg-amber-500 hover:bg-amber-600 text-black px-4 py-3 rounded-xl text-sm font-medium">Mint</button>
    </div>
  </div>
</div>

<!-- PancakeSwap modal -->
<div id="swapModal" class="modal-overlay">
  <div class="modal-content">
    <button class="close-modal" onclick="closeSwap()">✕</button>
    <iframe id="swapIframe" src="about:blank"></iframe>
  </div>
</div>

<script>
  // ----- CONFIG -----
  const PROXY_ADDRESS = "0xBdf9e9B29720389EeBf9b6D95a5077341E66114c";
  const PANCAKE_SWAP_URL = `https://pancakeswap.finance/swap?outputCurrency=${PROXY_ADDRESS}&chainId=56`;

  // Minimal ABI for balance, transfer, mint, owner, hasRole, MINTER_ROLE
  const MIN_ABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function transfer(address to, uint256 amount) returns (bool)",
    "function mint(address to, uint256 amount)",
    "function owner() view returns (address)",
    "function hasRole(bytes32 role, address account) view returns (bool)",
    "function MINTER_ROLE() view returns (bytes32)"
  ];

  let provider, signer, contract, userAddress;

  // DOM refs
  const connectBtn = document.getElementById('connectBtn');
  const balanceEl = document.getElementById('balanceDisplay');
  const recipientInput = document.getElementById('recipient');
  const amountInput = document.getElementById('amount');
  const sendBtn = document.getElementById('sendBtn');
  const tradeBtn = document.getElementById('tradeBtn');
  const adminPanel = document.getElementById('adminPanel');
  const mintRecipient = document.getElementById('mintRecipient');
  const mintAmount = document.getElementById('mintAmount');
  const mintBtn = document.getElementById('mintBtn');

  // ----- CONNECT -----
  async function connectWallet() {
    if (typeof window.ethereum === 'undefined') {
      alert('Please open this page in a Web3 wallet (Trust Wallet / MetaMask).');
      return;
    }
    try {
      await window.ethereum.request({ method: 'eth_requestAccounts' });
      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      userAddress = await signer.getAddress();
      connectBtn.innerHTML = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
      connectBtn.disabled = true;

      contract = new ethers.Contract(PROXY_ADDRESS, MIN_ABI, signer);
      await updateBalance();
      await checkAdmin();
    } catch (e) {
      console.error(e);
      alert('Connection failed.');
    }
  }

  // ----- BALANCE -----
  async function updateBalance() {
    if (!contract || !userAddress) return;
    const raw = await contract.balanceOf(userAddress);
    const formatted = ethers.utils.formatUnits(raw, 18);
    balanceEl.textContent = formatted;
  }

  // ----- ADMIN CHECK -----
  async function checkAdmin() {
    try {
      const owner = await contract.owner();
      const minterRole = await contract.MINTER_ROLE();
      const isOwner = owner.toLowerCase() === userAddress.toLowerCase();
      const isMinter = await contract.hasRole(minterRole, userAddress);
      if (isOwner || isMinter) {
        adminPanel.classList.remove('hidden');
      }
    } catch (_) { /* ignore */ }
  }

  // ----- SEND -----
  async function sendTokens() {
    const to = recipientInput.value.trim();
    const amount = amountInput.value.trim();
    if (!ethers.utils.isAddress(to)) return alert('Invalid recipient address.');
    if (!amount || isNaN(amount)) return alert('Invalid amount.');
    try {
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="spinner"></span>';
      const wei = ethers.utils.parseUnits(amount, 18);
      const tx = await contract.transfer(to, wei);
      alert('Transfer sent – waiting for confirmation...');
      await tx.wait();
      alert('Transfer successful!');
      await updateBalance();
      recipientInput.value = '';
      amountInput.value = '';
    } catch (e) {
      alert('Transfer failed: ' + e.message);
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
    }
  }

  // ----- MINT -----
  async function mintTokens() {
    const to = mintRecipient.value.trim();
    const amount = mintAmount.value.trim();
    if (!ethers.utils.isAddress(to)) return alert('Invalid mint recipient.');
    if (!amount || isNaN(amount)) return alert('Invalid amount.');
    try {
      mintBtn.disabled = true;
      mintBtn.innerHTML = '<span class="spinner"></span>';
      const wei = ethers.utils.parseUnits(amount, 18);
      const tx = await contract.mint(to, wei);
      alert('Mint sent – waiting for confirmation...');
      await tx.wait();
      alert('Mint successful!');
      mintRecipient.value = '';
      mintAmount.value = '';
      await updateBalance();
    } catch (e) {
      alert('Mint failed: ' + e.message);
    } finally {
      mintBtn.disabled = false;
      mintBtn.textContent = 'Mint';
    }
  }

  // ----- TRADE MODAL -----
  function openSwap() {
    document.getElementById('swapModal').style.display = 'flex';
    document.getElementById('swapIframe').src = PANCAKE_SWAP_URL;
  }

  function closeSwap() {
    document.getElementById('swapModal').style.display = 'none';
    document.getElementById('swapIframe').src = 'about:blank';
  }

  // ----- EVENT BINDINGS -----
  connectBtn.addEventListener('click', connectWallet);
  sendBtn.addEventListener('click', sendTokens);
  mintBtn.addEventListener('click', mintTokens);
  tradeBtn.addEventListener('click', openSwap);

  // Auto‑connect if already approved (e.g., page reload)
  if (window.ethereum) {
    window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
      if (accounts.length > 0) connectWallet();
    }).catch(() => {});
    window.ethereum.on('accountsChanged', () => window.location.reload());
    window.ethereum.on('chainChanged', () => window.location.reload());
  }
</script>
</body>
</html>
